name: build-tacplus-ng
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: almalinux:8
    steps:
      - name: Install build deps
        run: |
          dnf -y install gcc make perl perl-core git openssl-devel pcre2-devel tar gzip findutils

      - name: Clone source
        run: |
          git clone https://github.com/MarcJHuber/event-driven-servers.git

      - name: Build
        run: |
          set -x
          cd event-driven-servers
          ./configure tac_plus-ng </dev/null
          make
          make install

      - name: Collect
        run: |
          set -x
          BIN=$(find /usr/local -name 'tac_plus-ng' -type f | head -1)
          echo "BIN=$BIN"; "$BIN" -v || true
          mkdir -p out/lib
          cp -a /usr/local out/usr_local
          ldd "$BIN" | awk '{print $3}' | grep -E '^/' | while read l; do cp -L "$l" out/lib/ 2>/dev/null || true; done
          find /usr/local -name '*.so*' -exec cp -L {} out/lib/ \; 2>/dev/null || true
          tar czf tacplus-ng-el8.tar.gz -C out .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tacplus-ng-el8
          path: tacplus-ng-el8.tar.gz
