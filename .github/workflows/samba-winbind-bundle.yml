name: samba-winbind-el8-bundle

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Download samba-winbind + deps (Rocky 8.10 현행)
        run: |
          mkdir -p out
          docker run --rm -v "$PWD/out:/out" rockylinux:8 bash -ceu '
            dnf -y install dnf-plugins-core createrepo_c
            printf "[r8-baseos]\nname=r8-baseos\nbaseurl=https://dl.rockylinux.org/pub/rocky/8/BaseOS/x86_64/os/\nenabled=1\ngpgcheck=0\n[r8-appstream]\nname=r8-appstream\nbaseurl=https://dl.rockylinux.org/pub/rocky/8/AppStream/x86_64/os/\nenabled=1\ngpgcheck=0\n" > /etc/yum.repos.d/r8.repo
            mkdir -p /dl
            echo "===== 가용 버전 확인 ====="
            dnf list --showduplicates samba-winbind samba-common-libs krb5-workstation 2>/dev/null | tail -20 || true
            echo "===== 다운로드 (현행 + 의존 samba libs 일괄) ====="
            dnf install -y --downloadonly --downloaddir=/dl --setopt=install_weak_deps=False \
              samba-winbind samba-winbind-clients samba-common-tools \
              samba-common-libs samba-client-libs samba-common libwbclient libsmbclient \
              krb5-workstation
            echo "===== 받은 RPM ====="; ls -1 /dl
            echo "===== 버전 (★서버=4.19.4-3.el8 / krb5=1.18.2-27.el8_10) ====="; rpm -qp --qf "%{NAME} %{VERSION}-%{RELEASE}.%{ARCH}\n" /dl/*.rpm | sort
            ls /dl | grep -q "samba-winbind-" || { echo "FAIL: samba-winbind 없음"; exit 1; }
            rm -rf /out/* || true; cp /dl/*.rpm /out/
            createrepo_c /out
            echo "===== 오프라인 설치검증 (clean container) ====="
            dnf install -y --disablerepo="*" --nogpgcheck /dl/*.rpm
            echo "tools:"; command -v net ntlm_auth wbinfo kinit klist
          '
      - name: tar + 체크섬
        run: |
          cd out; tar czf ../samba-winbind-el8-bundle.tar.gz .; cd ..
          sha256sum samba-winbind-el8-bundle.tar.gz | tee bundle.sha256
          echo "RPM 개수: $(ls out/*.rpm | wc -l)"
      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: samba-winbind-el8-bundle
          path: |
            samba-winbind-el8-bundle.tar.gz
            bundle.sha256
          retention-days: 7
