name: samba-winbind-el8-bundle

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Download samba-winbind 4.19.4-3.el8 (서버 매칭) + deps
        run: |
          mkdir -p out
          docker run --rm -v "$PWD/out:/out" rockylinux:8 bash -ceu '
            dnf -y install dnf-plugins-core createrepo_c
            printf "[r810-vault-baseos]\nname=vault-baseos\nbaseurl=https://dl.rockylinux.org/vault/rocky/8.10/BaseOS/x86_64/os/\nenabled=1\ngpgcheck=0\n[r810-vault-appstream]\nname=vault-appstream\nbaseurl=https://dl.rockylinux.org/vault/rocky/8.10/AppStream/x86_64/os/\nenabled=1\ngpgcheck=0\n" > /etc/yum.repos.d/r810-vault.repo
            mkdir -p /dl
            echo "===== samba-winbind 가용 버전 ====="
            dnf list --showduplicates samba-winbind 2>/dev/null | tail -12 || true
            echo "===== 다운로드 (4.19.4-3.el8 매칭) ====="
            dnf install -y --downloadonly --downloaddir=/dl --setopt=install_weak_deps=False \
              samba-winbind-4.19.4-3.el8 samba-winbind-clients-4.19.4-3.el8 samba-common-tools-4.19.4-3.el8 krb5-workstation-1.18.2-27.el8_10
            echo "===== 받은 RPM ====="; ls -1 /dl
            echo "===== 버전 ====="; rpm -qp --qf "%{NAME} %{VERSION}-%{RELEASE}.%{ARCH}\n" /dl/*.rpm | sort
            ls /dl | grep -q "samba-winbind-4.19.4-3.el8" || { echo "FAIL: samba-winbind 4.19.4-3.el8 없음"; exit 1; }
            rm -rf /out/* || true; cp /dl/*.rpm /out/
            createrepo_c /out
            echo "===== 오프라인 설치검증 (clean) ====="
            dnf install -y --disablerepo="*" --nogpgcheck /dl/*.rpm
            echo "tools:"; command -v net ntlm_auth wbinfo kinit klist
          '
      - name: tar + 체크섬
        run: |
          cd out; tar czf ../samba-winbind-el8-bundle.tar.gz .; cd ..
          sha256sum samba-winbind-el8-bundle.tar.gz | tee bundle.sha256
          echo "RPM 개수: $(ls out/*.rpm | wc -l)"
      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: samba-winbind-el8-bundle
          path: |
            samba-winbind-el8-bundle.tar.gz
            bundle.sha256
          retention-days: 7
