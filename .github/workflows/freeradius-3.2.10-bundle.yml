name: freeradius-3.2.10-el8-bundle

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Download + 검증 (Rocky 8 컨테이너)
        run: |
          mkdir -p out
          docker run --rm -v "$PWD/out:/out" rockylinux:8 bash -ceu '
            dnf -y install dnf-plugins-core
            dnf -y module reset freeradius || true
            dnf -y module disable freeradius || true
            dnf config-manager --set-enabled powertools || true
            printf "[inkbridge]\nname=inkbridge\nbaseurl=https://packages.inkbridgenetworks.com/freeradius-3.2/rocky/8/\nenabled=1\ngpgcheck=0\nmodule_hotfixes=1\n" > /etc/yum.repos.d/inkbridge.repo
            printf "[inkbridge-extras]\nname=inkbridge-extras\nbaseurl=https://packages.inkbridgenetworks.com/extras/rocky/8/\nenabled=1\ngpgcheck=0\nmodule_hotfixes=1\n" > /etc/yum.repos.d/inkbridge-extras.repo
            printf "[ltb-project]\nname=ltb-project\nbaseurl=https://ltb-project.org/rpm/8/x86_64\nenabled=1\ngpgcheck=0\n" > /etc/yum.repos.d/ltb-project.repo
            rm -rf /out/* || true
            echo "===== 다운로드(설치 트랜잭션, deps 포함) ====="
            dnf install -y --downloadonly --downloaddir=/out --setopt=install_weak_deps=False \
              freeradius freeradius-ldap freeradius-utils freeradius-sqlite
            echo "===== freeradius 버전 ====="
            rpm -qp --qf "%{NAME} %{VERSION}-%{RELEASE}.%{ARCH}\n" /out/freeradius-*.rpm | sort
            if ls /out | grep -q "3.0.20"; then echo "FAIL: 3.0.20 섞임"; exit 1; fi
            if ! ls /out | grep -q "freeradius-3.2.10"; then echo "FAIL: 3.2.10 없음"; exit 1; fi
            echo "===== 핵심 의존성(libkqueue/openldap) ====="
            ls /out | grep -iE "kqueue|openldap" || echo "(별도 패키지 없음 - 설치검증으로 확인)"
            echo "===== 오프라인 설치 검증 (/out 만으로) ====="
            dnf install -y --disablerepo="*" --nogpgcheck --setopt=install_weak_deps=False /out/*.rpm
            echo "===== 설치된 버전 (3.2.10 이어야 함) ====="
            radiusd -v | head -1
            echo "radsniff: $(command -v radsniff || echo 없음)"
          '
      - name: tar 묶음 + 체크섬
        run: |
          cd out
          tar czf ../freeradius-3.2.10-el8-bundle.tar.gz *.rpm
          cd ..
          sha256sum freeradius-3.2.10-el8-bundle.tar.gz | tee bundle.sha256
          echo "포함 RPM 개수: $(ls out/*.rpm | wc -l)"
      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: freeradius-3.2.10-el8-bundle
          path: |
            freeradius-3.2.10-el8-bundle.tar.gz
            bundle.sha256
          retention-days: 7
