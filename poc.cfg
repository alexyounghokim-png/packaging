id = spawnd {
	background = no
	listen { port = 4949 }
	spawn { instances min = 1 instances max = 8 }
}

id = tac_plus-ng {
	device cisco_grp   { address = 10.1.0.0/16  key = testkey }
	device juniper_grp { address = 10.2.0.0/16  key = testkey }

	profile show_only {
		script {
			if (service == shell) {
				if (cmd == "") { set priv-lvl = 15 permit }
				if (cmd =~ /^show/) { permit }
				deny
			}
			deny
		}
	}

	profile full {
		script {
			if (service == shell) {
				if (cmd == "") { set priv-lvl = 15 permit }
				permit
			}
			deny
		}
	}

	user youngho {
		password login = clear test123
		password pap = login
	}

	ruleset {
		rule cisco   { enabled = yes  script { if (user == youngho && device == cisco_grp)   { profile = show_only permit } } }
		rule juniper { enabled = yes  script { if (user == youngho && device == juniper_grp) { profile = full      permit } } }
	}
}
